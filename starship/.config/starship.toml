add_newline = true

format = """
$directory$git_branch$git_status$nodejs$rust$python$package
$character"""

[character]
success_symbol = "[➜](bold green)"
error_symbol = "[➜](bold red)"

[directory]
truncation_length = 3
truncate_to_repo = true
style = "bold cyan"

[git_branch]
symbol = " "
style = "bold purple"

[git_status]
style = "bold yellow"

[nodejs]
format = "[$symbol($version )]($style)"
symbol = " "

[package]
disabled = false
